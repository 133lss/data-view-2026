<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ECharts Test</title>
<script src="echarts.min.js"></script>
</head>
<body>
<h2>ECharts Local Test</h2>
<div id="testChart" style="width:600px;height:400px;border:1px solid #ccc;"></div>
<div id="status"></div>
<script>
var statusEl = document.getElementById('status');
try {
    statusEl.innerHTML = 'echarts type: ' + typeof echarts;
    if (typeof echarts === 'undefined') {
        statusEl.innerHTML += '<br>ERROR: echarts not loaded!';
    } else {
        var chart = echarts.init(document.getElementById('testChart'));
        chart.setOption({
            xAxis: {type: 'category', data: ['Mon','Tue','Wed','Thu','Fri']},
            yAxis: {type: 'value'},
            series: [{data: [150,230,224,218,135], type: 'line'}]
        });
        statusEl.innerHTML += '<br>Chart rendered OK!';
    }
} catch(e) {
    statusEl.innerHTML += '<br>ERROR: ' + e.message;
    console.error(e);
}
</script>
</body>
</html>
